<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Quiet Feed</title>
    <link rel="stylesheet" href="../shared/theme.css">
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <header class="header">
      <img class="header__icon" src="../../icons/icon-48.png" alt="">
      <div class="header__copy">
        <strong>Quiet Feed</strong>
        <span id="version">Loading…</span>
      </div>
      <button class="button button--text" id="open-options" type="button">Settings</button>
    </header>

    <main class="main">
      <section class="stats panel" aria-labelledby="stats-title">
        <span class="eyebrow" id="stats-title">Blocked content</span>
        <div class="stats__grid">
          <div class="stat"><span>Reels</span><strong id="stat-reels">0</strong></div>
          <div class="stat"><span>Suggested</span><strong id="stat-suggested">0</strong></div>
          <div class="stat"><span>Sponsored</span><strong id="stat-sponsored">0</strong></div>
        </div>
      </section>

      <div class="filter-health" id="filter-health" data-status="waiting">
        <span class="filter-health__dot" aria-hidden="true"></span>
        <span id="filter-health-label">Checking filter status…</span>
      </div>

      <div class="filter-tabs" role="tablist" aria-label="Setting categories">
        <button class="filter-tab" id="tab-feed" type="button" role="tab" aria-selected="true" aria-controls="filter-panel" data-tab="feed">Feed content</button>
        <button class="filter-tab" id="tab-distractions" type="button" role="tab" aria-selected="false" aria-controls="filter-panel" data-tab="distractions" tabindex="-1">Other distractions</button>
      </div>

      <section id="filter-panel" role="tabpanel" aria-labelledby="tab-feed">
        <div class="feature-list" id="feature-list"></div>
      </section>

      <div class="reload-alert" id="reload-alert" role="status" hidden>
        <span id="reload-copy">Setting saved.</span>
        <div class="reload-alert__actions">
          <button class="button button--text" id="dismiss-reload" type="button">Not now</button>
          <button class="button button--primary" id="reload-facebook" type="button">Reload</button>
        </div>
      </div>
      <div class="save-status" id="save-status" role="alert" hidden></div>
    </main>

    <footer class="footer">Local settings · no account required</footer>

    <dialog class="confirmation-dialog" id="suggested-confirm">
      <div class="confirmation-dialog__body">
        <h2>Remove suggested content?</h2>
        <p id="suggested-confirm-copy"></p>
      </div>
      <form class="confirmation-dialog__actions" method="dialog">
        <button class="button" value="cancel" autofocus>Cancel</button>
        <button class="button button--primary" value="confirm">Enable filter</button>
      </form>
    </dialog>

    <script src="../shared/features.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
