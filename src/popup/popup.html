<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Quiet Feed</title>
    <link rel="stylesheet" href="../shared/theme.css">
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <header class="header">
      <img class="header__icon" src="../../icons/icon-48.png" alt="">
      <div class="header__copy">
        <strong>Quiet Feed</strong>
        <span id="version">Loading…</span>
      </div>
      <button class="button button--text" id="open-options" type="button">Settings</button>
    </header>

    <main class="main">
      <section class="stats panel" aria-labelledby="stats-title">
        <span class="eyebrow" id="stats-title">Blocked content</span>
        <div class="stats__grid">
          <div class="stat"><span>Reels</span><strong id="stat-reels">0</strong></div>
          <div class="stat"><span>Suggested</span><strong id="stat-suggested">0</strong></div>
          <div class="stat"><span>Sponsored</span><strong id="stat-sponsored">0</strong></div>
        </div>
      </section>

      <section aria-label="Feed filters">
        <div class="feature-list" id="feature-list"></div>
      </section>

      <div class="restart-alert" id="restart-alert" role="status" hidden>
        <span>Optional: Restart Facebook to ensure this setting is fully applied.</span>
        <button class="button button--primary" id="restart-facebook" type="button">Restart</button>
      </div>
      <div class="save-status" id="save-status" role="alert" hidden></div>
    </main>

    <footer class="footer">Local settings · no account required</footer>

    <script src="../shared/features.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
